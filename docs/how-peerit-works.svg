<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How peerit assembles your feed" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>How peerit assembles your feed</title>
  <desc>Each user writes their own signed outbox of posts and votes. Your device pulls copies of those outboxes, verifies every Ed25519 signature, and merges the valid records into the feed you read — communities, posts, threads and vote tallies. Forged or tampered records fail verification and are dropped, so no server has to be trusted.</desc>
  <style>
    :root{--bg:#ffffff;--panel:#f6f8fa;--line:#d0d7de;--ink:#1f2328;--muted:#59636e;--blue:#0969da;--bluefill:#ddf4ff;--teal:#117f63;--tealfill:#d2f3e9}
    @media (prefers-color-scheme: dark){:root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--ink:#e6edf3;--muted:#9198a1;--blue:#4493f8;--bluefill:#0b2a4a;--teal:#3fb950;--tealfill:#0c2a1c}}
    .th{font-weight:600;font-size:16px;fill:var(--ink)}
    .t{font-size:14px;fill:var(--ink)}
    .ts{font-size:12px;fill:var(--muted)}
    .on-fill{font-size:12px;fill:var(--ink)}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

  <rect x="0.5" y="0.5" width="679" height="299" rx="12" fill="var(--bg)" stroke="var(--line)"/>
  <text class="th" x="340" y="34" text-anchor="middle">How peerit assembles your feed</text>

  <rect x="28" y="62" width="150" height="50" rx="8" fill="var(--panel)" stroke="var(--line)"/>
  <text class="t" x="103" y="92" text-anchor="middle">alice's outbox</text>
  <rect x="28" y="126" width="150" height="50" rx="8" fill="var(--panel)" stroke="var(--line)"/>
  <text class="t" x="103" y="156" text-anchor="middle">bob's outbox</text>
  <rect x="28" y="190" width="150" height="50" rx="8" fill="var(--panel)" stroke="var(--line)"/>
  <text class="t" x="103" y="220" text-anchor="middle">carol's outbox</text>
  <text class="ts" x="103" y="260" text-anchor="middle">personal signed outboxes</text>

  <line x1="180" y1="87" x2="256" y2="125" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="180" y1="151" x2="256" y2="150" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="180" y1="215" x2="256" y2="175" stroke="var(--muted)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="94" width="176" height="112" rx="10" fill="var(--bluefill)" stroke="var(--blue)"/>
  <text class="th" x="348" y="128" text-anchor="middle">your device</text>
  <text class="on-fill" x="348" y="152" text-anchor="middle">verify every signature</text>
  <text class="on-fill" x="348" y="173" text-anchor="middle">merge the outboxes</text>

  <line x1="438" y1="150" x2="490" y2="150" stroke="var(--teal)" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="494" y="108" width="160" height="84" rx="10" fill="var(--tealfill)" stroke="var(--teal)"/>
  <text class="th" x="574" y="142" text-anchor="middle">your feed</text>
  <text class="on-fill" x="574" y="164" text-anchor="middle">posts · threads · votes</text>

  <text class="ts" x="340" y="288" text-anchor="middle">valid signatures kept · forged or tampered records dropped at the merge</text>
</svg>
